<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>big-sync · {{ label }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; }
    .sidebar { width: 56px; min-height: 100vh; background: #13151f; border-right: 1px solid #1e2030; display: flex; flex-direction: column; align-items: center; padding: 1rem 0; gap: 0.25rem; flex-shrink: 0; }
    .sidebar .logo { font-size: 1.1rem; font-weight: 800; color: #6366f1; margin-bottom: 1rem; letter-spacing: -0.05em; text-decoration: none; }
    .nav-item { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: background 0.15s; }
    .nav-item.active { background: #1e2030; color: #6366f1; }
    .nav-item:not(.active) { color: #2d3148; }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-item .tooltip { position: absolute; left: 52px; background: #1e2030; color: #e2e8f0; font-size: 0.7rem; font-weight: 500; padding: 0.3rem 0.6rem; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; border: 1px solid #2d3148; z-index: 10; }
    .nav-item:hover .tooltip { opacity: 1; }
    .nav-item.active .tooltip { color: #6366f1; }
    .sidebar-divider { width: 24px; height: 1px; background: #1e2030; margin: 0.25rem 0; }
    .sidebar-spacer { flex: 1; }
    main { flex: 1; padding: 2rem; display: flex; flex-direction: column; }
    .topbar { margin-bottom: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    h1 span { color: #6366f1; }
    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding-bottom: 6rem; }
    .placeholder-icon { width: 56px; height: 56px; background: #1e2030; border: 1px solid #2d3148; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #374151; }
    .placeholder-icon svg { width: 28px; height: 28px; }
    .placeholder h2 { font-size: 1.1rem; font-weight: 600; color: #4b5563; }
    .placeholder p { font-size: 0.8rem; color: #374151; }
  </style>
</head>
<body>
  {% with active=source %}{% include "common/_sidebar.html" %}{% endwith %}

  <main>
    <div class="topbar">
      <h1>big<span>-sync</span> <span style="color:#374151;font-weight:400;font-size:1rem;">/ {{ label }}</span></h1>
    </div>
    <div class="placeholder">
      <div class="placeholder-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2>{{ label }}</h2>
      <p>Implementazione non sviluppata</p>
    </div>
  </main>
</body>
</html>
