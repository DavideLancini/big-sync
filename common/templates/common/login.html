<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>big-sync · login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e2030; border: 1px solid #2d3148; border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
    h1 span { color: #6366f1; }
    .sub { font-size: 0.75rem; color: #64748b; margin-bottom: 2rem; }
    label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 0.4rem; }
    input[type=password] { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 0.6rem 0.75rem; color: #e2e8f0; font-size: 0.875rem; outline: none; transition: border-color 0.15s; }
    input[type=password]:focus { border-color: #6366f1; }
    .error { font-size: 0.75rem; color: #f87171; margin-top: 0.5rem; }
    button { margin-top: 1.25rem; width: 100%; background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 0.65rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>big<span>-sync</span></h1>
    <p class="sub">Inserisci la password per accedere.</p>
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password">
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit">Accedi</button>
    </form>
  </div>
</body>
</html>
